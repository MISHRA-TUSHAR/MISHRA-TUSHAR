<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Projects">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .card { opacity:0; animation:in .6s ease forwards; }
      .c1{animation-delay:.1s}.c2{animation-delay:.28s}
      @keyframes in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    </style>
  </defs>
  <rect width="1200" height="260" rx="14" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="1199" height="259" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="44" y="52" class="mono" font-size="13" letter-spacing="3" fill="#7a7a7a">~/ PROJECTS</text>
  <line x1="44" y1="70" x2="1156" y2="70" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Swadesh -->
  <g class="card c1">
    <rect x="44" y="96" width="540" height="138" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="70" y="134" class="sans" font-size="20" font-weight="700" fill="#ffffff">Swadesh</text>
    <text x="70" y="160" class="mono" font-size="12" fill="#8b8b8b">Flutter · Node.js · MongoDB</text>
    <text x="70" y="190" class="sans" font-size="14" fill="#b8b8b8">Ecommerce app — admin/user portals, Apple Pay +</text>
    <text x="70" y="210" class="sans" font-size="14" fill="#b8b8b8">Google Pay, JWT-secured backend, Provider state.</text>
  </g>

  <!-- GoStream -->
  <g class="card c2">
    <rect x="616" y="96" width="540" height="138" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="642" y="134" class="sans" font-size="20" font-weight="700" fill="#ffffff">GoStream</text>
    <text x="642" y="160" class="mono" font-size="12" fill="#8b8b8b">Golang · WebRTC · WebSocket</text>
    <text x="642" y="190" class="sans" font-size="14" fill="#b8b8b8">Video-conferencing server — real-time WebRTC</text>
    <text x="642" y="210" class="sans" font-size="14" fill="#b8b8b8">streaming + WebSocket chat, customizable views.</text>
  </g>
</svg>
