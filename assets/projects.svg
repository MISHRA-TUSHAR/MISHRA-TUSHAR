<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Projects">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .card { opacity:0; animation:in .6s ease forwards; }
      .c1{animation-delay:.1s}.c2{animation-delay:.28s}
      @keyframes in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    </style>
  </defs>
  <rect width="1200" height="320" rx="16" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1198" height="318" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="48" y="62" class="mono" font-size="16" letter-spacing="4" fill="#7a7a7a">~/ PROJECTS</text>
  <line x1="48" y1="84" x2="1152" y2="84" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Swadesh -->
  <g class="card c1">
    <rect x="48" y="112" width="540" height="172" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="78" y="160" class="sans" font-size="26" font-weight="700" fill="#ffffff">Swadesh</text>
    <text x="78" y="190" class="mono" font-size="15" fill="#8b8b8b">Flutter · Node.js · MongoDB</text>
    <text x="78" y="226" class="sans" font-size="17" fill="#bdbdbd">Ecommerce app — admin/user portals, Apple Pay</text>
    <text x="78" y="252" class="sans" font-size="17" fill="#bdbdbd">+ Google Pay, JWT backend, Provider state.</text>
  </g>

  <!-- GoStream -->
  <g class="card c2">
    <rect x="612" y="112" width="540" height="172" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="642" y="160" class="sans" font-size="26" font-weight="700" fill="#ffffff">GoStream</text>
    <text x="642" y="190" class="mono" font-size="15" fill="#8b8b8b">Golang · WebRTC · WebSocket</text>
    <text x="642" y="226" class="sans" font-size="17" fill="#bdbdbd">Video-conferencing server — real-time WebRTC</text>
    <text x="642" y="252" class="sans" font-size="17" fill="#bdbdbd">streaming + WebSocket chat, customizable views.</text>
  </g>
</svg>
