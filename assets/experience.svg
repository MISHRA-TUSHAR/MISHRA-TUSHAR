<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience">
  <defs>
    <style>
      .mono { font-family: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace; }
      .sans { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .row { opacity: 0; animation: in .6s ease forwards; }
      .r1{animation-delay:.1s}.r2{animation-delay:.25s}.r3{animation-delay:.4s}.r4{animation-delay:.55s}
      @keyframes in { from { opacity:0; transform: translateX(-12px) } to { opacity:1; transform: translateX(0) } }
    </style>
  </defs>
  <rect width="1200" height="300" rx="14" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="40" y="56" class="mono" font-size="13" letter-spacing="3" fill="#7a7a7a">~/ EXPERIENCE</text>
  <line x1="40" y1="74" x2="1160" y2="74" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- vertical timeline -->
  <line x1="52" y1="100" x2="52" y2="268" stroke="#ffffff" stroke-opacity="0.15"/>

  <g class="row r1">
    <circle cx="52" cy="112" r="5" fill="#ffffff"/>
    <text x="80" y="118" class="sans" font-size="19" font-weight="700" fill="#ffffff">Goodspace<tspan class="sans" font-weight="400" fill="#8b8b8b" font-size="15">  —  Software Development Engineer I</tspan></text>
    <text x="1160" y="118" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Jan 2025 — Present</text>
    <text x="80" y="138" class="sans" font-size="13" fill="#9a9a9a">Azure→GCP migration · AI Sales Agent Hub · Kafka 500k events/day · 99.8% delivery</text>
  </g>
  <g class="row r2">
    <circle cx="52" cy="166" r="5" fill="#ffffff" fill-opacity="0.7"/>
    <text x="80" y="172" class="sans" font-size="19" font-weight="700" fill="#ffffff">Goodspace AI<tspan class="sans" font-weight="400" fill="#8b8b8b" font-size="15">  —  Software Developer Intern</tspan></text>
    <text x="1160" y="172" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Oct 2024 — Dec 2024</text>
    <text x="80" y="192" class="sans" font-size="13" fill="#9a9a9a">Native→Flutter migration · 600k+ users · 99% crash-free · 4.5★ Play Store</text>
  </g>
  <g class="row r3">
    <circle cx="52" cy="220" r="5" fill="#ffffff" fill-opacity="0.55"/>
    <text x="80" y="226" class="sans" font-size="19" font-weight="700" fill="#ffffff">Berri<tspan class="sans" font-weight="400" fill="#8b8b8b" font-size="15">  —  Flutter Developer Intern</tspan></text>
    <text x="1160" y="226" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Feb 2024 — Apr 2024</text>
    <text x="80" y="246" class="sans" font-size="13" fill="#9a9a9a">Matching algorithm + realtime chat (1000+ concurrent) · +40% retention</text>
  </g>
  <g class="row r4">
    <circle cx="52" cy="268" r="5" fill="#ffffff" fill-opacity="0.4"/>
    <text x="80" y="274" class="sans" font-size="19" font-weight="700" fill="#ffffff">C-DAC (MeitY)<tspan class="sans" font-weight="400" fill="#8b8b8b" font-size="15">  —  Software Development Intern</tspan></text>
    <text x="1160" y="274" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Aug 2023 — Sep 2023</text>
  </g>
</svg>
