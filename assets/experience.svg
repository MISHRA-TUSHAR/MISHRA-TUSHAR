<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .row { opacity:0; animation:in .6s ease forwards; }
      .r1{animation-delay:.1s}.r2{animation-delay:.25s}.r3{animation-delay:.4s}.r4{animation-delay:.55s}
      @keyframes in { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:none} }
    </style>
  </defs>
  <rect width="1200" height="360" rx="16" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1198" height="358" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="48" y="62" class="mono" font-size="16" letter-spacing="4" fill="#7a7a7a">~/ EXPERIENCE</text>
  <line x1="48" y1="84" x2="1152" y2="84" stroke="#ffffff" stroke-opacity="0.08"/>

  <line x1="66" y1="142" x2="66" y2="316" stroke="#ffffff" stroke-opacity="0.14"/>

  <g class="row r1">
    <circle cx="66" cy="142" r="6" fill="#ffffff"/>
    <text x="100" y="150" class="sans" font-size="26" font-weight="700" fill="#ffffff">Goodspace</text>
    <text x="285" y="150" class="sans" font-size="18" fill="#8b8b8b">Software Development Engineer I</text>
    <text x="1152" y="150" text-anchor="end" class="mono" font-size="16" fill="#9a9a9a">Jan 2025 — Present</text>
  </g>
  <g class="row r2">
    <circle cx="66" cy="200" r="6" fill="#ffffff" fill-opacity="0.75"/>
    <text x="100" y="208" class="sans" font-size="26" font-weight="700" fill="#ffffff">Goodspace AI</text>
    <text x="310" y="208" class="sans" font-size="18" fill="#8b8b8b">Software Developer Intern</text>
    <text x="1152" y="208" text-anchor="end" class="mono" font-size="16" fill="#9a9a9a">Oct 2024 — Dec 2024</text>
  </g>
  <g class="row r3">
    <circle cx="66" cy="258" r="6" fill="#ffffff" fill-opacity="0.55"/>
    <text x="100" y="266" class="sans" font-size="26" font-weight="700" fill="#ffffff">Berri</text>
    <text x="205" y="266" class="sans" font-size="18" fill="#8b8b8b">Flutter Developer Intern</text>
    <text x="1152" y="266" text-anchor="end" class="mono" font-size="16" fill="#9a9a9a">Feb 2024 — Apr 2024</text>
  </g>
  <g class="row r4">
    <circle cx="66" cy="316" r="6" fill="#ffffff" fill-opacity="0.4"/>
    <text x="100" y="324" class="sans" font-size="26" font-weight="700" fill="#ffffff">C-DAC (MeitY)</text>
    <text x="335" y="324" class="sans" font-size="18" fill="#8b8b8b">Software Development Intern</text>
    <text x="1152" y="324" text-anchor="end" class="mono" font-size="16" fill="#9a9a9a">Aug 2023 — Sep 2023</text>
  </g>
</svg>
