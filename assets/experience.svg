<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .row { opacity:0; animation:in .6s ease forwards; }
      .r1{animation-delay:.1s}.r2{animation-delay:.25s}.r3{animation-delay:.4s}.r4{animation-delay:.55s}
      @keyframes in { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:none} }
    </style>
  </defs>
  <rect width="1200" height="300" rx="14" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="44" y="52" class="mono" font-size="13" letter-spacing="3" fill="#7a7a7a">~/ EXPERIENCE</text>
  <line x1="44" y1="70" x2="1156" y2="70" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- timeline rail -->
  <line x1="60" y1="116" x2="60" y2="252" stroke="#ffffff" stroke-opacity="0.14"/>

  <g class="row r1">
    <circle cx="60" cy="116" r="5" fill="#ffffff"/>
    <text x="90" y="122" class="sans" font-size="20" font-weight="700" fill="#ffffff">Goodspace</text>
    <text x="232" y="122" class="sans" font-size="15" fill="#8b8b8b">Software Development Engineer I</text>
    <text x="1156" y="122" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Jan 2025 — Present</text>
  </g>
  <g class="row r2">
    <circle cx="60" cy="162" r="5" fill="#ffffff" fill-opacity="0.75"/>
    <text x="90" y="168" class="sans" font-size="20" font-weight="700" fill="#ffffff">Goodspace AI</text>
    <text x="248" y="168" class="sans" font-size="15" fill="#8b8b8b">Software Developer Intern</text>
    <text x="1156" y="168" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Oct 2024 — Dec 2024</text>
  </g>
  <g class="row r3">
    <circle cx="60" cy="208" r="5" fill="#ffffff" fill-opacity="0.55"/>
    <text x="90" y="214" class="sans" font-size="20" font-weight="700" fill="#ffffff">Berri</text>
    <text x="170" y="214" class="sans" font-size="15" fill="#8b8b8b">Flutter Developer Intern</text>
    <text x="1156" y="214" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Feb 2024 — Apr 2024</text>
  </g>
  <g class="row r4">
    <circle cx="60" cy="252" r="5" fill="#ffffff" fill-opacity="0.4"/>
    <text x="90" y="258" class="sans" font-size="20" font-weight="700" fill="#ffffff">C-DAC (MeitY)</text>
    <text x="270" y="258" class="sans" font-size="15" fill="#8b8b8b">Software Development Intern</text>
    <text x="1156" y="258" text-anchor="end" class="mono" font-size="13" fill="#8b8b8b">Aug 2023 — Sep 2023</text>
  </g>
</svg>
