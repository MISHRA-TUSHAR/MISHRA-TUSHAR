<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech stack">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .row { opacity:0; animation:in .6s ease forwards; }
      .r1{animation-delay:.05s}.r2{animation-delay:.18s}.r3{animation-delay:.31s}.r4{animation-delay:.44s}
      @keyframes in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
      .chip { fill:rgba(255,255,255,.05); stroke:rgba(255,255,255,.14); }
      .ct { fill:#e6e6e6; }
      .lb { fill:#6e6e6e; letter-spacing:2px; }
    </style>
  </defs>
  <rect width="1200" height="420" rx="16" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1198" height="418" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="48" y="62" class="mono" font-size="16" letter-spacing="4" fill="#7a7a7a">~/ STACK</text>
  <line x1="48" y1="84" x2="1152" y2="84" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- LANGUAGES -->
  <g class="row r1 mono">
    <text x="48" y="148" class="mono lb" font-size="15">LANGUAGES</text>
    <g class="mono ct" font-size="18">
      <rect class="chip" x="270" y="120" width="64"  height="42" rx="9"/><text x="288" y="148">Go</text>
      <rect class="chip" x="350" y="120" width="120" height="42" rx="9"/><text x="368" y="148">Node.js</text>
      <rect class="chip" x="486" y="120" width="150" height="42" rx="9"/><text x="504" y="148">JavaScript</text>
      <rect class="chip" x="652" y="120" width="112" height="42" rx="9"/><text x="670" y="148">Python</text>
      <rect class="chip" x="780" y="120" width="84"  height="42" rx="9"/><text x="798" y="148">Dart</text>
      <rect class="chip" x="880" y="120" width="76"  height="42" rx="9"/><text x="898" y="148">C++</text>
    </g>
  </g>

  <!-- BACKEND -->
  <g class="row r2">
    <text x="48" y="223" class="mono lb" font-size="15">BACKEND</text>
    <g class="mono ct" font-size="18">
      <rect class="chip" x="270" y="195" width="110" height="42" rx="9"/><text x="288" y="223">Express</text>
      <rect class="chip" x="396" y="195" width="104" height="42" rx="9"/><text x="414" y="223">Flutter</text>
      <rect class="chip" x="516" y="195" width="112" height="42" rx="9"/><text x="534" y="223">WebRTC</text>
      <rect class="chip" x="644" y="195" width="128" height="42" rx="9"/><text x="662" y="223">Socket.IO</text>
      <rect class="chip" x="788" y="195" width="92"  height="42" rx="9"/><text x="806" y="223">Kafka</text>
    </g>
  </g>

  <!-- DATA -->
  <g class="row r3">
    <text x="48" y="298" class="mono lb" font-size="15">DATA</text>
    <g class="mono ct" font-size="18">
      <rect class="chip" x="270" y="270" width="120" height="42" rx="9"/><text x="288" y="298">MongoDB</text>
      <rect class="chip" x="406" y="270" width="150" height="42" rx="9"/><text x="424" y="298">PostgreSQL</text>
      <rect class="chip" x="572" y="270" width="88"  height="42" rx="9"/><text x="590" y="298">Redis</text>
      <rect class="chip" x="676" y="270" width="170" height="42" rx="9"/><text x="694" y="298">Elasticsearch</text>
      <rect class="chip" x="862" y="270" width="96"  height="42" rx="9"/><text x="880" y="298">MySQL</text>
    </g>
  </g>

  <!-- CLOUD -->
  <g class="row r4">
    <text x="48" y="373" class="mono lb" font-size="15">CLOUD / DEVOPS</text>
    <g class="mono ct" font-size="18">
      <rect class="chip" x="270" y="345" width="164" height="42" rx="9"/><text x="288" y="373">Google Cloud</text>
      <rect class="chip" x="450" y="345" width="72"  height="42" rx="9"/><text x="468" y="373">AWS</text>
      <rect class="chip" x="538" y="345" width="88"  height="42" rx="9"/><text x="556" y="373">Azure</text>
      <rect class="chip" x="642" y="345" width="104" height="42" rx="9"/><text x="660" y="373">Docker</text>
      <rect class="chip" x="762" y="345" width="186" height="42" rx="9"/><text x="780" y="373">GitHub Actions</text>
    </g>
  </g>
</svg>
