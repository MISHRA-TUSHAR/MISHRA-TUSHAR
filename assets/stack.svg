<svg width="1200" height="270" viewBox="0 0 1200 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech stack">
  <defs>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .row { opacity:0; animation:in .6s ease forwards; }
      .r1{animation-delay:.05s}.r2{animation-delay:.18s}.r3{animation-delay:.31s}.r4{animation-delay:.44s}
      @keyframes in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
      .chip { fill:rgba(255,255,255,.045); stroke:rgba(255,255,255,.14); }
      .ct { fill:#e6e6e6; }
    </style>
  </defs>
  <rect width="1200" height="270" rx="14" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="1199" height="269" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="40" y="50" class="mono" font-size="13" letter-spacing="3" fill="#7a7a7a">~/ STACK</text>
  <line x1="40" y1="66" x2="1160" y2="66" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- LANGUAGES -->
  <g class="row r1">
    <text x="40" y="108" class="mono" font-size="11" letter-spacing="2" fill="#6e6e6e">LANGUAGES</text>
    <g class="mono" font-size="13">
      <rect class="chip" x="190" y="92"  width="58"  height="28" rx="6"/><text class="ct" x="205" y="111">Go</text>
      <rect class="chip" x="258" y="92"  width="88"  height="28" rx="6"/><text class="ct" x="273" y="111">Node.js</text>
      <rect class="chip" x="356" y="92"  width="110" height="28" rx="6"/><text class="ct" x="371" y="111">JavaScript</text>
      <rect class="chip" x="476" y="92"  width="82"  height="28" rx="6"/><text class="ct" x="491" y="111">Python</text>
      <rect class="chip" x="568" y="92"  width="62"  height="28" rx="6"/><text class="ct" x="583" y="111">Dart</text>
      <rect class="chip" x="640" y="92"  width="58"  height="28" rx="6"/><text class="ct" x="655" y="111">C++</text>
    </g>
  </g>

  <!-- BACKEND -->
  <g class="row r2">
    <text x="40" y="152" class="mono" font-size="11" letter-spacing="2" fill="#6e6e6e">BACKEND</text>
    <g class="mono" font-size="13">
      <rect class="chip" x="190" y="136" width="84"  height="28" rx="6"/><text class="ct" x="205" y="155">Express</text>
      <rect class="chip" x="284" y="136" width="78"  height="28" rx="6"/><text class="ct" x="299" y="155">Flutter</text>
      <rect class="chip" x="372" y="136" width="82"  height="28" rx="6"/><text class="ct" x="387" y="155">WebRTC</text>
      <rect class="chip" x="464" y="136" width="92"  height="28" rx="6"/><text class="ct" x="479" y="155">Socket.IO</text>
      <rect class="chip" x="566" y="136" width="66"  height="28" rx="6"/><text class="ct" x="581" y="155">Kafka</text>
    </g>
  </g>

  <!-- DATA -->
  <g class="row r3">
    <text x="40" y="196" class="mono" font-size="11" letter-spacing="2" fill="#6e6e6e">DATA</text>
    <g class="mono" font-size="13">
      <rect class="chip" x="190" y="180" width="92"  height="28" rx="6"/><text class="ct" x="205" y="199">MongoDB</text>
      <rect class="chip" x="292" y="180" width="106" height="28" rx="6"/><text class="ct" x="307" y="199">PostgreSQL</text>
      <rect class="chip" x="408" y="180" width="64"  height="28" rx="6"/><text class="ct" x="423" y="199">Redis</text>
      <rect class="chip" x="482" y="180" width="118" height="28" rx="6"/><text class="ct" x="497" y="199">Elasticsearch</text>
      <rect class="chip" x="610" y="180" width="70"  height="28" rx="6"/><text class="ct" x="625" y="199">MySQL</text>
    </g>
  </g>

  <!-- CLOUD -->
  <g class="row r4">
    <text x="40" y="240" class="mono" font-size="11" letter-spacing="2" fill="#6e6e6e">CLOUD / DEVOPS</text>
    <g class="mono" font-size="13">
      <rect class="chip" x="190" y="224" width="116" height="28" rx="6"/><text class="ct" x="205" y="243">Google Cloud</text>
      <rect class="chip" x="316" y="224" width="62"  height="28" rx="6"/><text class="ct" x="331" y="243">AWS</text>
      <rect class="chip" x="388" y="224" width="68"  height="28" rx="6"/><text class="ct" x="403" y="243">Azure</text>
      <rect class="chip" x="466" y="224" width="76"  height="28" rx="6"/><text class="ct" x="481" y="243">Docker</text>
      <rect class="chip" x="552" y="224" width="120" height="28" rx="6"/><text class="ct" x="567" y="243">GitHub Actions</text>
    </g>
  </g>
</svg>
