<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tushar Mishra — Software Development Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
    </pattern>
    <style>
      .mono { font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace; }
      .sans { font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; }
      .fade { opacity:0; animation:in .7s ease forwards; }
      .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}.d4{animation-delay:.6s}.d5{animation-delay:.75s}
      @keyframes in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
      .blink { animation:bl 1.05s steps(1) infinite }
      @keyframes bl { 50% { opacity:0 } }
    </style>
  </defs>

  <rect width="1200" height="430" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="16" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="428" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>

  <!-- nav -->
  <g class="fade d1">
    <circle cx="56" cy="56" r="6" fill="#ffffff"/>
    <text x="74" y="63" class="mono" font-size="20" font-weight="600" fill="#ffffff">tushar.dev</text>
    <text x="1144" y="62" text-anchor="end" class="mono" font-size="15" fill="#8b8b8b">India · open to build</text>
  </g>
  <line x1="40" y1="90" x2="1160" y2="90" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- eyebrow -->
  <text x="56" y="172" class="mono fade d2" font-size="17" letter-spacing="5" fill="#7a7a7a">SOFTWARE&#160;DEVELOPMENT&#160;ENGINEER&#160;@&#160;GOODSPACE</text>

  <!-- headline -->
  <text x="52" y="262" class="sans fade d3" font-size="82" font-weight="800" fill="#ffffff" letter-spacing="-2">Tushar Mishra</text>
  <text x="56" y="320" class="sans fade d4" font-size="34" font-weight="500" fill="#c4c4c4">I build backends that scale<tspan fill="#ffffff" class="blink">_</tspan></text>

  <!-- pills -->
  <g class="mono fade d5" font-size="17" fill="#ededed">
    <rect x="56"  y="356" width="230" height="48" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="80"  y="386">500k+ events / day</text>
    <rect x="302" y="356" width="252" height="48" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="326" y="386">1000+ calls @ 200ms</text>
    <rect x="570" y="356" width="270" height="48" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="594" y="386">SIH '24 — Top 5 / 500</text>
  </g>
</svg>
