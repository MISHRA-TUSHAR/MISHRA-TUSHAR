<svg width="1200" height="440" viewBox="0 0 1200 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tushar Mishra — Software Development Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <style>
      .mono { font-family: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace; }
      .sans { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .fade { opacity: 0; animation: in .7s ease forwards; }
      .d1 { animation-delay: .15s } .d2 { animation-delay: .30s }
      .d3 { animation-delay: .45s } .d4 { animation-delay: .60s }
      .d5 { animation-delay: .75s } .d6 { animation-delay: .90s }
      @keyframes in { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
      .blink { animation: bl 1.05s steps(1) infinite }
      @keyframes bl { 50% { opacity: 0 } }
    </style>
  </defs>

  <!-- surface -->
  <rect width="1200" height="440" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="440" rx="14" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="1199" height="439" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>

  <!-- nav bar -->
  <g class="fade d1">
    <circle cx="48" cy="46" r="5" fill="#ffffff"/>
    <text x="64" y="51" class="mono" font-size="16" font-weight="600" fill="#ffffff">tushar.dev</text>
    <text x="800"  y="51" class="mono" font-size="13" fill="#8b8b8b">work</text>
    <text x="880"  y="51" class="mono" font-size="13" fill="#8b8b8b">stack</text>
    <text x="965"  y="51" class="mono" font-size="13" fill="#8b8b8b">projects</text>
    <text x="1080" y="51" class="mono" font-size="13" fill="#8b8b8b">contact</text>
  </g>
  <line x1="32" y1="74" x2="1168" y2="74" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- eyebrow -->
  <text x="48" y="150" class="mono fade d2" font-size="14" letter-spacing="4" fill="#7a7a7a">SOFTWARE&#160;DEVELOPMENT&#160;ENGINEER&#160;·&#160;GOODSPACE</text>

  <!-- headline -->
  <text x="46" y="232" class="sans fade d3" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Tushar Mishra</text>
  <text x="48" y="296" class="sans fade d4" font-size="30" font-weight="500" fill="#bdbdbd">I build backends that scale<tspan fill="#ffffff" class="blink">_</tspan></text>

  <!-- metric pills -->
  <g class="mono fade d5" font-size="13" fill="#e6e6e6">
    <rect x="48"  y="338" width="190" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="68"  y="363">500k+ events / day</text>
    <rect x="252" y="338" width="210" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="272" y="363">1000+ calls @ 200ms</text>
    <rect x="476" y="338" width="160" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="496" y="363">600k+ users</text>
    <rect x="650" y="338" width="220" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="670" y="363">SIH '24 — Top 5 / 500</text>
  </g>

  <!-- right accent code block -->
  <g class="mono fade d6" font-size="13">
    <rect x="930" y="120" width="222" height="150" rx="10" fill="#000000" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="930" y="120" width="222" height="28" rx="10" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="948" cy="134" r="3.5" fill="#ff5f56"/><circle cx="962" cy="134" r="3.5" fill="#ffbd2e"/><circle cx="976" cy="134" r="3.5" fill="#27c93f"/>
    <text x="948" y="174" fill="#8b8b8b">const <tspan fill="#ffffff">dev</tspan> = {</text>
    <text x="962" y="196" fill="#8b8b8b">role: <tspan fill="#cfcfcf">"SDE I"</tspan>,</text>
    <text x="962" y="218" fill="#8b8b8b">stack: <tspan fill="#cfcfcf">[Go, Node]</tspan>,</text>
    <text x="962" y="240" fill="#8b8b8b">cloud: <tspan fill="#cfcfcf">"GCP"</tspan>,</text>
    <text x="948" y="262" fill="#8b8b8b">}</text>
  </g>

  <rect x="0" y="0" width="1200" height="440" rx="14" fill="url(#fade)"/>
</svg>
